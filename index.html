<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safety Monitor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <style>
        :root { --bg-color: #f0f2f5; --card-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        body { background-color: var(--bg-color); font-family: 'Segoe UI', sans-serif; color: #2d3436; }
        
        .card { 
            border: none; 
            border-radius: 20px; 
            box-shadow: var(--card-shadow); 
            background: #ffffff; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card:hover { transform: translateY(-5px); }
        
        /*تدرجات البطاقات*/
        .bg-fire { background: linear-gradient(135deg, #ff416c, #ff4b2b); color: white; }
        .bg-security { background: linear-gradient(135deg, #f7971e, #ffd200); color: white; }
        .bg-nature { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .bg-traffic { background: linear-gradient(135deg, #2193b0, #6dd5ed); color: white; }
        .bg-normal { background: linear-gradient(135deg, #11998e, #38ef7d); color: white; }
        .bg-total { background: linear-gradient(135deg, #444, #666); color: white; }

        .chart-container { position: relative; height: 300px; width: 100%; }
        .chart-center-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; pointer-events: none;
        }
        .chart-center-text strong { display: block; color: #2d3436; font-size: 2.2rem; font-weight: 800; line-height: 1; }

        .btn-monitor {
            background-color: #ffffff; color: #495057; border: 1px solid #dee2e6;
            border-radius: 12px; padding: 10px 24px; font-size: 0.9rem; font-weight: 600;
            transition: all 0.3s ease; display: flex; align-items: center; gap: 10px; margin: 30px auto; cursor: pointer;
        }
        .btn-monitor.active { 
            background-color: #e8faf0; color: #10ac84; border-color: #1dd1a1;
            animation: pulse-border 2s infinite;
        }
        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(29, 209, 161, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(29, 209, 161, 0); }
            100% { box-shadow: 0 0 0 0 rgba(29, 209, 161, 0); }
        }

        .status-dot { height: 8px; width: 8px; background-color: #cbd5e0; border-radius: 50%; }
        .active .status-dot { background-color: #1dd1a1; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .filter-btn { 
            border: 1px solid #edf2f7; background: white; border-radius: 10px; 
            padding: 6px 14px; margin-right: 4px; font-size: 0.85rem; transition: 0.3s; 
        }
        .filter-btn.active { background-color: #2d3436; color: white; border-color: #2d3436; }
        
        /*رابط الخريطة*/
        .map-link { 
            color: #0d6efd; 
            text-decoration: none; 
            font-size: 0.75rem; 
            font-family: 'Courier New', Courier, monospace; 
            font-weight: bold;
            display: inline-block;
            margin-top: 5px;
            padding: 2px 5px;
            border-radius: 4px;
            background: #eef2ff;
            transition: 0.2s;
        }
        .map-link:hover { background: #0d6efd; color: white; }

        .badge-critical { background: #e74c3c; color: white; animation: flash 1s infinite; }
        .new-row { animation: slideInRight 0.5s ease-out; }
    </style>
</head>

<body class="p-4">

<div class="container-fluid px-lg-5">
    <header class="text-center mb-5 animate__animated animate__fadeInDown">
        <h2 class="fw-bold">Safety Monitor</h2>
        <p class="text-muted">Interactive Command Dashboard</p>
    </header>

    <div class="row g-3 mb-5 text-center">
        <div class="col-md-2 col-6 animate__animated animate__zoomIn" style="animation-delay: 0.1s;">
            <div class="card p-3 bg-fire"><span>🔥</span><h6>Fires</h6><h3 id="fireCount">0</h3></div>
        </div>
        <div class="col-md-2 col-6 animate__animated animate__zoomIn" style="animation-delay: 0.2s;">
            <div class="card p-3 bg-security"><span>🚨</span><h6>Security</h6><h3 id="intrusionCount">0</h3></div>
        </div>
        <div class="col-md-2 col-6 animate__animated animate__zoomIn" style="animation-delay: 0.3s;">
            <div class="card p-3 bg-nature"><span>🌪️</span><h6>Nature</h6><h3 id="disasterCount">0</h3></div>
        </div>
        <div class="col-md-2 col-6 animate__animated animate__zoomIn" style="animation-delay: 0.4s;">
            <div class="card p-3 bg-traffic"><span>🚗</span><h6>Traffic</h6><h3 id="trafficCount">0</h3></div>
        </div>
        <div class="col-md-2 col-6 animate__animated animate__zoomIn" style="animation-delay: 0.5s;">
            <div class="card p-3 bg-normal"><span>✅</span><h6>Normal</h6><h3 id="normalCount">0</h3></div>
        </div>
        <div class="col-md-2 col-6 animate__animated animate__zoomIn" style="animation-delay: 0.6s;">
            <div class="card p-3 bg-total"><span>📊</span><h6>Total</h6><h3 id="totalCount">0</h3></div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-4 animate__animated animate__fadeInLeft" style="animation-delay: 0.8s;">
            <div class="card p-4 h-100">
                <h6 class="fw-bold mb-4 text-muted text-uppercase small">Incident Reporting</h6>
                <div class="mb-3">
                    <label class="form-label small fw-bold">City</label>
                    <input id="location" class="form-control bg-light border-0" placeholder="e.g. Gaza" style="border-radius: 10px;">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">GPS (Lat, Lng)</label>
                    <input id="coords" class="form-control bg-light border-0" placeholder="32.2, 35.2" style="border-radius: 10px;">
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold">Incident Type</label>
                    <select id="type" class="form-select bg-light border-0" style="border-radius: 10px;">
                        <option value="Normal">Normal</option>
                        <option value="Fire">Fire</option>
                        <option value="Security Intrusion">Security Breach</option>
                        <option value="Earthquake">Natural Disaster</option>
                        <option value="Road Accident">Road Accident</option>
                    </select>
                </div>
                <button onclick="addEvent()" class="btn btn-dark w-100 py-3 mt-auto shadow" style="border-radius:12px;">Submit Report</button>
            </div>
        </div>

        <div class="col-lg-8 animate__animated animate__fadeInRight" style="animation-delay: 0.8s;">
            <div class="card p-4 h-100">
                <h6 class="fw-bold mb-4 text-muted text-uppercase small text-center">Analytics Distribution</h6>
                <div class="chart-container">
                    <canvas id="eventChart"></canvas>
                    <div class="chart-center-text">
                        <span class="small text-muted fw-bold">TOTAL</span>
                        <strong id="chartCenterTotal">0</strong>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="animate__animated animate__fadeInUp" style="animation-delay: 1s;">
        <button id="simBtn" onclick="toggleSimulation()" class="btn-monitor">
            <span class="status-dot"></span>
            <span id="simText">Start Live Monitoring</span>
        </button>
    </div>

    <div class="card p-4 mb-5 animate__animated animate__fadeInUp" style="animation-delay: 1.2s;">
        <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-3">
            <div id="filterContainer">
                <button class="filter-btn active" onclick="setFilter('ALL', this)">All</button>
                <button class="filter-btn" onclick="setFilter('Fire', this)">🔥</button>
                <button class="filter-btn" onclick="setFilter('Security', this)">🚨</button>
                <button class="filter-btn" onclick="setFilter('Disaster', this)">🌪️</button>
                <button class="filter-btn" onclick="setFilter('Traffic', this)">🚗</button>
            </div>
            <button onclick="clearEvents()" class="btn btn-sm btn-outline-danger border-0 fw-bold">🗑 Clear Data</button>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th class="px-4 border-0">Location</th>
                        <th class="border-0">Time</th>
                        <th class="border-0">Incident Type</th>
                        <th class="border-0">Status</th>
                    </tr>
                </thead>
                <tbody id="eventTable"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
let stats = JSON.parse(localStorage.getItem("pal_final_v1")) || { Fire:0, Security:0, Disaster:0, Traffic:0, Normal:0, Total:0 };
let logEntries = JSON.parse(localStorage.getItem("pal_logs_final_v1")) || [];
let currentFilter = 'ALL';
let simulationInterval = null;

const eventMap = {
    "Normal": { icon: "✅", cat: "Normal", color: "#1dd1a1", isCritical: false },
    "Fire": { icon: "🔥", cat: "Fire", color: "#ff416c", isCritical: true },
    "Security Intrusion": { icon: "🚨", cat: "Security", color: "#f7971e", isCritical: false },
    "disaster": { icon: "🌪", cat: "Disaster", color: "#667eea", isCritical: true },
    "Road Accident": { icon: "🚗", cat: "Traffic", color: "#2193b0", isCritical: false }
};

const palCities = [
    { name: "Jerusalem", lat: "31.7683", lng: "35.2137" },
    { name: "Gaza City", lat: "31.5017", lng: "34.4668" },
    { name: "Ramallah", lat: "31.9029", lng: "35.2062" },
    { name: "Nablus", lat: "32.2211", lng: "35.2544" },
    { name: "Hebron", lat: "31.5326", lng: "35.0998" }
];

const ctx = document.getElementById("eventChart");
const chart = new Chart(ctx, {
    type: 'doughnut',
    data: {
        labels: ["Fire", "Security", "Disasters", "Traffic", "Normal"],
        datasets: [{
            data: [0,0,0,0,0],
            backgroundColor: ["#ff416c", "#f7971e", "#667eea", "#2193b0", "#11998e"],
            borderWidth: 0,
            cutout: '82%'
        }]
    },
    options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom', labels: { usePointStyle: true } } }
    }
});

function toggleSimulation() {
    const btn = document.getElementById("simBtn");
    const text = document.getElementById("simText");
    if (simulationInterval) {
        clearInterval(simulationInterval);
        simulationInterval = null;
        btn.classList.remove("active");
        text.innerText = "Start Live Monitoring";
    } else {
        simulationInterval = setInterval(simulateEvent, 3000);
        btn.classList.add("active");
        text.innerText = "Monitoring Active";
    }
}

function simulateEvent() {
    const city = palCities[Math.floor(Math.random()*palCities.length)];
    const type = Object.keys(eventMap)[Math.floor(Math.random()*Object.keys(eventMap).length)];
    addRecord(city.name, type, `${city.lat},${city.lng}`);
}

function addEvent() {
    const loc = document.getElementById("location").value;
    const coords = document.getElementById("coords").value || "31.9,35.2";
    const type = document.getElementById("type").value;
    if(!loc) return alert("Enter City");
    addRecord(loc, type, coords);
    document.getElementById("location").value = "";
    document.getElementById("coords").value = "";
}

function addRecord(loc, type, coords) {
    const info = eventMap[type];
    const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    stats[info.cat]++;
    stats.Total++;
    
    if(info.isCritical) {
        Toastify({ text: `🚨 ${type} in ${loc}!`, duration: 4000, style: { background: "#ff416c" } }).showToast();
    }
    
    logEntries.push({ loc, type, cat: info.cat, time, coords });
    if(logEntries.length > 50) logEntries.shift();
    saveAndRender();
}

function saveAndRender() {
    localStorage.setItem("pal_final_v1", JSON.stringify(stats));
    localStorage.setItem("pal_logs_final_v1", JSON.stringify(logEntries));
    render();
}

function render() {
    document.getElementById("fireCount").innerText = stats.Fire;
    document.getElementById("intrusionCount").innerText = stats.Security;
    document.getElementById("disasterCount").innerText = stats.Disaster;
    document.getElementById("trafficCount").innerText = stats.Traffic;
    document.getElementById("normalCount").innerText = stats.Normal;
    document.getElementById("totalCount").innerText = stats.Total;
    document.getElementById("chartCenterTotal").innerText = stats.Total;

    chart.data.datasets[0].data = [stats.Fire, stats.Security, stats.Disaster, stats.Traffic, stats.Normal];
    chart.update();

    const table = document.getElementById("eventTable");
    table.innerHTML = "";
    const filtered = logEntries.filter(e => currentFilter === 'ALL' || e.cat === currentFilter);
    
    filtered.slice().reverse().forEach((e, index) => {
        const info = eventMap[e.type];
        //توليد رابط جوجل ماب
        const googleMapUrl = `https://www.google.com/maps?q=${e.coords.replace(/\s+/g, '')}`;
        
        const rowClass = index === 0 ? 'new-row' : '';
        table.innerHTML += `
            <tr class="${rowClass}">
                <td class="px-4">
                    <div class="fw-bold">${e.loc}</div>
                    <a href="${googleMapUrl}" target="_blank" class="map-link">🗺️ View Location (${e.coords})</a>
                </td>
                <td class="small fw-bold text-muted">${e.time}</td>
                <td>${info.icon} ${e.type}</td>
                <td>${info.isCritical ? '<span class="badge badge-critical">CRITICAL</span>' : '<span class="badge bg-light text-dark">STABLE</span>'}</td>
            </tr>`;
    });
}

function setFilter(category, btn) {
    currentFilter = category;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
}

function clearEvents() {
    if(confirm("Confirm Wipe?")) {
        stats = { Fire:0, Security:0, Disaster:0, Traffic:0, Normal:0, Total:0 };
        logEntries = [];
        saveAndRender();
    }
}

render();
</script>
</body>
</html>
